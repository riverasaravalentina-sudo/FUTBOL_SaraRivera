<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Jugadores - [[${club.nombre}]]</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #e2e8f0;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);
            z-index: 0;
        }
        .container { position: relative; z-index: 10; padding: 2rem 1rem; }
        .page-header { text-align: center; margin-bottom: 3rem; }
        .club-title {
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 0.5rem; margin-top: 1.5rem;
        }
        .back-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #6366f1; padding: 10px 20px; border-radius: 10px;
            text-decoration: none; display: inline-flex; align-items: center;
            gap: 8px; font-weight: 600; transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(99, 102, 241, 0.2); transform: translateX(-5px); }
        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.4);
            color: #10b981; border-radius: 12px; padding: 1rem; margin-bottom: 2rem;
        }
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem; margin-bottom: 3rem;
        }
        .player-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 15px; padding: 1.5rem;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .player-card::before {
            content: ''; position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
        }
        .player-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }
        .player-number {
            position: absolute; top: 1rem; right: 1rem;
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 1.5rem; font-weight: 800; color: white;
        }
        .player-name { font-size: 1.2rem; font-weight: 700; color: #fff; margin-bottom: 0.5rem; }
        .player-position {
            display: inline-block;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid rgba(139, 92, 246, 0.3);
            padding: 5px 15px; border-radius: 20px;
            font-size: 0.85rem; color: #c4b5fd; font-weight: 600; margin-top: 0.5rem;
        }
        .empty-state {
            text-align: center; padding: 3rem;
            color: #64748b; font-size: 1.1rem;
            grid-column: 1 / -1;
        }
        .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; color: #6366f1; }
        .form-section {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px; padding: 2.5rem; margin-top: 3rem;
        }
        .form-title { font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 2rem; text-align: center; }
        .form-control {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #e2e8f0; padding: 12px 18px; border-radius: 10px; transition: all 0.3s;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #6366f1; color: #fff;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }
        .form-control::placeholder { color: #64748b; }
        .btn-submit {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none; padding: 14px 40px; border-radius: 12px;
            color: white; font-weight: 700; font-size: 1.1rem;
            transition: all 0.3s; box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(99, 102, 241, 0.6); }
        .player-counter {
            position: fixed; bottom: 30px; right: 30px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white; padding: 15px 30px; border-radius: 50px;
            font-weight: 700; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4); z-index: 1000;
        }
        @media (max-width: 768px) {
            .players-grid { grid-template-columns: 1fr; }
            .club-title { font-size: 2rem; }
            .form-section { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="page-header">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <a th:href="@{/listar}" class="back-btn">
                    <i class="bi bi-arrow-left"></i> Volver a Clubes
                </a>
                <a href="/" class="back-btn">
                    <i class="bi bi-house"></i> Inicio
                </a>
            </div>
            <h1 class="club-title" th:text="'Jugadores de ' + ${club.nombre}">Jugadores del Club</h1>
        </div>

        <div th:if="${success != null}" class="alert alert-success">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        </div>

        <!-- ✅ Ahora itera sobre "jugadores" que viene del modelo, NO de club.jugadores -->
        <div class="players-grid">
            <div th:if="${#lists.isEmpty(jugadores)}" class="empty-state">
                <i class="bi bi-person-x"></i>
                Este club aún no tiene jugadores registrados.
            </div>
            <div class="player-card" th:each="jug : ${jugadores}">
                <div class="player-number" th:text="${jug.numero}">10</div>
                <div class="player-name" th:text="${jug.nombre + ' ' + jug.apellido}">Nombre Jugador</div>
                <span class="player-position" th:text="${jug.posicion}">Posición</span>
            </div>
        </div>

        <div class="form-section">
            <h4 class="form-title">
                <i class="bi bi-person-plus me-2"></i>
                Agregar Nuevo Jugador
            </h4>
            <form th:action="@{/club/{clubId}/jugadores/guardar(clubId=${club.id})}" method="post" class="row g-3">
                <div class="col-md-6">
                    <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
                </div>
                <div class="col-md-6">
                    <input type="text" name="apellido" class="form-control" placeholder="Apellido" required>
                </div>
                <div class="col-md-6">
                    <input type="number" name="numero" class="form-control" placeholder="Número" required>
                </div>
                <div class="col-md-6">
                    <input type="text" name="posicion" class="form-control" placeholder="Posición">
                </div>
                <div class="col-12 text-center mt-4">
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-plus-circle me-2"></i>Agregar Jugador
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- ✅ Contador usa "jugadores" del modelo -->
    <div class="player-counter">
        <i class="bi bi-people-fill me-2"></i>
        <span th:text="${#lists.size(jugadores)} + ' Jugadores'">0 Jugadores</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
