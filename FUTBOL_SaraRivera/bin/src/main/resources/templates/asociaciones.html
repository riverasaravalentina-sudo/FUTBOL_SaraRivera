<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Asociaciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0e27; color: #e2e8f0; min-height: 100vh; }
        .navbar { background: rgba(15,23,42,0.8) !important; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(99,102,241,0.2); }
        .navbar-brand { font-weight: 800; color: #fff !important; }
        .navbar-brand i { color: #6366f1; }
        .container { padding: 3rem 1rem; }
        .page-title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 2rem; }
        .btn-new { background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; padding: 10px 25px; border-radius: 10px; color: white; font-weight: 600; text-decoration: none; }
        .card-item { background: rgba(15,23,42,0.6); border: 1px solid rgba(99,102,241,0.2); border-radius: 15px; padding: 1.5rem; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s; }
        .card-item:hover { border-color: rgba(99,102,241,0.5); transform: translateY(-3px); }
        .item-name { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .item-detail { color: #94a3b8; font-size: 0.9rem; }
        .btn-edit { background: rgba(59,130,246,0.2); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa; padding: 7px 15px; border-radius: 8px; text-decoration: none; font-weight: 600; margin-right: 5px; }
        .btn-delete { background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 7px 15px; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .alert-success { background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.4); color: #10b981; border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
        .back-btn { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <div class="d-flex align-items-center gap-3">
            <a href="/listar" class="back-btn"><i class="bi bi-arrow-left"></i></a>
            <a class="navbar-brand" href="/"><i class="bi bi-hexagon-fill me-2"></i>Fútbol Club</a>
        </div>
        <a href="/asociaciones/nuevo" class="btn-new"><i class="bi bi-plus-lg me-2"></i>Nueva Asociación</a>
    </nav>
    <div class="container col-md-8">
        <h1 class="page-title">Asociaciones</h1>
        <div th:if="${success}" class="alert-success"><i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span></div>
        <div th:each="a : ${asociaciones}" class="card-item">
            <div>
                <div class="item-name" th:text="${a.nombre}"></div>
                <div class="item-detail" th:text="${a.pais + ' · Presidente: ' + a.presidente}"></div>
            </div>
            <div>
                <a th:href="@{/asociaciones/editar/{id}(id=${a.id})}" class="btn-edit"><i class="bi bi-pencil"></i></a>
                <a th:href="@{/asociaciones/eliminar/{id}(id=${a.id})}" class="btn-delete" onclick="return confirm('¿Eliminar?')"><i class="bi bi-trash"></i></a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
