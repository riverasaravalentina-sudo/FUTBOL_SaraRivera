<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${club.id == null} ? 'Registrar Nuevo Club' : 'Editar Club'">Club Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #e2e8f0;
            min-height: 100vh;
            position: relative;
        }
        
        /* Animated grid */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.05) 2px, transparent 2px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.05) 2px, transparent 2px);
            background-size: 40px 40px;
            z-index: 0;
        }
        
        /* Glowing effect */
        .glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            z-index: 0;
        }
        
        .glow-1 {
            background: radial-gradient(circle, #6366f1, transparent);
            top: -250px;
            right: -250px;
            animation: float 20s ease-in-out infinite;
        }
        
        .glow-2 {
            background: radial-gradient(circle, #8b5cf6, transparent);
            bottom: -250px;
            left: -250px;
            animation: float 25s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(100px, 100px); }
        }
        
        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: #fff !important;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .navbar-brand i {
            color: #6366f1;
        }
        
        .btn-back {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #6366f1;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-back:hover {
            background: rgba(99, 102, 241, 0.3);
            color: #818cf8;
        }
        
        .btn-back-icon {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1.2rem;
        }
        
        .btn-back-icon:hover {
            background: rgba(99, 102, 241, 0.3);
            color: #818cf8;
            transform: translateX(-3px);
        }
        
        /* Container */
        .container {
            position: relative;
            z-index: 10;
            padding: 3rem 1rem;
        }
        
        /* Page title */
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        /* Alerts */
        .alert {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        
        .alert-danger {
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }
        
        .alert-success {
            border-color: rgba(16, 185, 129, 0.5);
            color: #10b981;
        }
        
        /* Form card */
        .form-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 25px;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }
        
        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899);
        }
        
        /* Form sections */
        .form-section {
            margin-bottom: 2.5rem;
        }
        
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #6366f1;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.5rem;
        }
        
        /* Form labels */
        .form-label {
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 0.8rem;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Form controls */
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #e2e8f0;
            padding: 14px 18px;
            border-radius: 12px;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .form-control:focus, .form-select:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #6366f1;
            color: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }
        
        .form-control::placeholder {
            color: #475569;
        }
        
        /* Checkboxes */
        .competitions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        
        .form-check {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 15px;
            border-radius: 12px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .form-check:hover {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(99, 102, 241, 0.1);
        }
        
        .form-check-input {
            width: 1.3em;
            height: 1.3em;
            border: 2px solid #6366f1;
            cursor: pointer;
            background: transparent;
        }
        
        .form-check-input:checked {
            background-color: #6366f1;
            border-color: #6366f1;
        }
        
        .form-check-label {
            font-weight: 600;
            color: #cbd5e1;
            cursor: pointer;
            margin-left: 10px;
        }
        
        /* Divider */
        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(99, 102, 241, 0.5), transparent);
            margin: 2.5rem 0;
        }
        
        /* Submit button */
        .btn-submit {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 16px 60px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 15px;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        
        .btn-submit:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6);
        }
        
        @media (max-width: 768px) {
            .form-card {
                padding: 2rem;
            }
            
            .page-title {
                font-size: 2rem;
            }
            
            .competitions-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>
    
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <div class="d-flex align-items-center gap-3">
                <a th:href="@{/listar}" class="btn-back-icon">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <a class="navbar-brand" href="/">
                    <i class="bi bi-hexagon-fill"></i>
                    Fútbol Club
                </a>
            </div>
            <a href="/" class="btn-back">
                <i class="bi bi-house me-2"></i>Inicio
            </a>
        </div>
    </nav>

    <div class="container col-md-10 col-lg-8">
        <h2 class="page-title" th:text="${club.id == null} ? 'Registrar Nuevo Club' : 'Editar Club'">
            Registrar Club
        </h2>

        <div th:if="${error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        </div>

        <form th:action="@{/guardar}" th:object="${club}" method="post" class="form-card">
            
            <div class="form-section">
                <div class="section-title">
                    <i class="bi bi-info-circle"></i>
                    Información Básica
                </div>
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Nombre del Club</label>
                        <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej. Real Madrid" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ciudad</label>
                        <input type="text" th:field="*{ciudad}" class="form-control" placeholder="Ej. Madrid" required>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="form-section">
                <div class="section-title">
                    <i class="bi bi-people"></i>
                    Personal y Asociación
                </div>
                
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Entrenador</label>
                        <select th:field="*{entrenador}" class="form-select" required>
                            <option value="">Selecciona un entrenador</option>
                            <option th:each="entrenador : ${entrenadores}"
                                    th:value="${entrenador.id}"
                                    th:text="${entrenador.nombre + ' ' + entrenador.apellido}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Asociación</label>
                        <select th:field="*{asociacion}" class="form-select" required>
                            <option value="">Selecciona una asociación</option>
                            <option th:each="asociacion : ${asociaciones}"
                                    th:value="${asociacion.id}"
                                    th:text="${asociacion.nombre}"></option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="form-section">
                <div class="section-title">
                    <i class="bi bi-trophy"></i>
                    Competiciones
                </div>
                
                <div class="competitions-grid">
                    <div th:each="comp : ${competiciones}" class="form-check">
                        <input class="form-check-input" type="checkbox" th:field="*{competiciones}" th:value="${comp.id}">
                        <label class="form-check-label" th:text="${comp.nombre}"></label>
                    </div>
                </div>
            </div>

            <div class="text-center mt-5">
                <button type="submit" class="btn-submit">
                    <i class="bi bi-save"></i>
                    Guardar Club
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
