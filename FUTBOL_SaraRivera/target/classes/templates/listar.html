<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Clubes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0e27;
            color: #e2e8f0;
            min-height: 100vh;
            position: relative;
        }
        
        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            opacity: 0.3;
        }
        
        /* Glowing orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            z-index: 0;
            animation: float 15s ease-in-out infinite;
        }
        
        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #6366f1, transparent);
            top: -200px;
            right: -200px;
        }
        
        .orb-2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #8b5cf6, transparent);
            bottom: -250px;
            left: -250px;
            animation-delay: 5s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, 50px); }
        }
        
        /* Navbar */
        .navbar {
            background: rgba(15, 23, 42, 0.8) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        
        .navbar-brand {
            font-weight: 800;
            font-size: 1.5rem;
            color: #fff !important;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .navbar-brand:hover {
            color: #6366f1 !important;
            transform: translateX(5px);
        }
        
        .navbar-brand i {
            font-size: 1.8rem;
            color: #6366f1;
        }
        
        .btn-new-club {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 10px 25px;
            font-weight: 600;
            border-radius: 10px;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
        }
        
        .btn-new-club:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.5);
        }
        
        .btn-back-nav {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6366f1;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1.2rem;
        }
        
        .btn-back-nav:hover {
            background: rgba(99, 102, 241, 0.3);
            color: #818cf8;
            transform: translateX(-3px);
        }
        
        /* Container */
        .container {
            position: relative;
            z-index: 10;
            padding: 3rem 1rem;
        }
        
        /* Title */
        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        /* Competitions Section */
        .competitions-section {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 3rem;
            animation: fadeInUp 0.5s ease;
        }
        
        .section-header {
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 0;
        }
        
        .section-title i {
            color: #fbbf24;
            font-size: 1.8rem;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .competitions-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }
        
        .competition-filter-btn {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .competition-filter-btn:hover {
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }
        
        .competition-filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-color: transparent;
            color: white;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
        }
        
        .competition-filter-btn i {
            font-size: 1.1rem;
        }
        
        /* Alerts */
        .alert {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid;
            border-radius: 12px;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            animation: slideDown 0.5s ease;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .alert-success {
            border-color: rgba(16, 185, 129, 0.5);
            color: #10b981;
        }
        
        .alert-danger {
            border-color: rgba(239, 68, 68, 0.5);
            color: #ef4444;
        }
        
        /* Cards Grid */
        .clubs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .club-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 20px;
            padding: 2rem;
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        
        .club-card:nth-child(1) { animation-delay: 0.1s; }
        .club-card:nth-child(2) { animation-delay: 0.2s; }
        .club-card:nth-child(3) { animation-delay: 0.3s; }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .club-card:hover {
            transform: translateY(-10px);
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
        }
        
        .club-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.5rem;
        }
        
        .club-id {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .club-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        
        .club-info {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin: 1.5rem 0;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        
        .info-item i {
            color: #6366f1;
            font-size: 1.1rem;
        }
        
        .competitions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 1.5rem 0;
        }
        
        .competition-badge {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #a5b4fc;
            font-weight: 500;
        }
        
        .club-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(99, 102, 241, 0.2);
        }
        
        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        
        .btn-edit:hover {
            background: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }
        
        .btn-players {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .btn-players:hover {
            background: rgba(16, 185, 129, 0.3);
            transform: translateY(-2px);
        }
        
        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.3);
            transform: translateY(-2px);
        }
        
        /* Counter */
        .counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            z-index: 1000;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @media (max-width: 768px) {
            .clubs-grid {
                grid-template-columns: 1fr;
            }
            
            .page-title {
                font-size: 2rem;
            }
            
            .counter {
                bottom: 20px;
                right: 20px;
                padding: 12px 25px;
                font-size: 0.9rem;
            }
            
            .competitions-filter {
                flex-direction: column;
            }
            
            .competition-filter-btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    
    <nav class="navbar navbar-dark">
        <div class="container-fluid">
            <div class="d-flex align-items-center gap-3">
                <a href="/" class="btn-back-nav">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <a class="navbar-brand" href="/">
                    <i class="bi bi-hexagon-fill"></i>
                    Fútbol Club
                </a>
            </div>
            <a class="btn btn-new-club" th:href="@{/nuevo}">
                <i class="bi bi-plus-lg me-2"></i>Nuevo Club
            </a>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Clubes Registrados</h1>

        <div th:if="${success}" class="alert alert-success">
            <i class="bi bi-check-circle me-2"></i><span th:text="${success}"></span>
        </div>
        <div th:if="${error}" class="alert alert-danger">
            <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${error}"></span>
        </div>

        <!-- Sección de Competiciones -->
        <div class="competitions-section">
            <div class="section-header">
                <h2 class="section-title">
                    <i class="bi bi-trophy-fill"></i>
                    Ver por Competición
                </h2>
            </div>
            
            <div class="competitions-filter">
                <button class="competition-filter-btn active" onclick="filterByCompetition('all')">
                    <i class="bi bi-grid-fill"></i>
                    Todas
                </button>
                <button class="competition-filter-btn" onclick="filterByCompetition('Copa Libertadores')">
                    🏆 Copa Libertadores
                </button>
                <button class="competition-filter-btn" onclick="filterByCompetition('Copa Sudamericana')">
                    ⭐ Copa Sudamericana
                </button>
                <button class="competition-filter-btn" onclick="filterByCompetition('Champions League')">
                    👑 Champions League
                </button>
                <button class="competition-filter-btn" onclick="filterByCompetition('Premier League')">
                    🌍 Premier League
                </button>
                <button class="competition-filter-btn" onclick="filterByCompetition('Liga Colombiana')">
                    🇨🇴 Liga Colombiana
                </button>
                <button class="competition-filter-btn" onclick="filterByCompetition('Liga MX')">
                    🇲🇽 Liga MX
                </button>
                <button class="competition-filter-btn" onclick="filterByCompetition('Concachampions')">
                    🏅 Concachampions
                </button>
            </div>
        </div>

        <div class="clubs-grid">
            <div class="club-card" th:each="club : ${clubes}">
                <div class="club-header">
                    <div>
                        <h3 class="club-name" th:text="${club.nombre}">Club Name</h3>
                    </div>
                    <div class="club-id" th:text="${club.id}">1</div>
                </div>
                
                <div class="club-info">
                    <div class="info-item">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span th:text="${club.ciudad}">Ciudad</span>
                    </div>
                    <div class="info-item">
                        <i class="bi bi-person-badge"></i>
                        <span th:text="${club.entrenador.nombre + ' ' + club.entrenador.apellido}">Entrenador</span>
                    </div>
                    <div class="info-item">
                        <i class="bi bi-building"></i>
                        <span th:text="${club.asociacion.nombre}">Asociación</span>
                    </div>
                </div>
                
                <div class="competitions">
                    <span class="competition-badge" th:each="comp : ${club.competiciones}" th:text="${comp.nombre}">
                        Competición
                    </span>
                </div>
                
                <div class="club-actions">
                    <a th:href="@{/editar/{id}(id=${club.id})}" class="btn-action btn-edit">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/club/{id}/jugadores(id=${club.id})}" class="btn-action btn-players">
                        <i class="bi bi-people"></i>
                    </a>
                    <a th:href="@{/eliminar/{id}(id=${club.id})}" class="btn-action btn-delete"
                       onclick="return confirm('¿Eliminar este club?');">
                        <i class="bi bi-trash"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="counter">
        <i class="bi bi-collection me-2"></i>
        <span th:text="${#lists.size(clubes)} + ' Clubes'">0 Clubes</span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Función para filtrar clubes por competición
        function filterByCompetition(competition) {
            // Actualizar botones activos
            document.querySelectorAll('.competition-filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Obtener todas las tarjetas de clubes
            const clubCards = document.querySelectorAll('.club-card');
            
            clubCards.forEach(card => {
                if (competition === 'all') {
                    card.style.display = 'block';
                    card.style.animation = 'fadeInUp 0.5s ease forwards';
                } else {
                    // Buscar si el club tiene la competición
                    const competitions = card.querySelectorAll('.competition-badge');
                    let hasCompetition = false;
                    
                    competitions.forEach(badge => {
                        if (badge.textContent.trim() === competition) {
                            hasCompetition = true;
                        }
                    });
                    
                    if (hasCompetition) {
                        card.style.display = 'block';
                        card.style.animation = 'fadeInUp 0.5s ease forwards';
                    } else {
                        card.style.display = 'none';
                    }
                }
            });
        }
    </script>
</body>
</html>
