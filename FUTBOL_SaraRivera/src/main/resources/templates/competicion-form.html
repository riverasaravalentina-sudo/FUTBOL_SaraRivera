<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Competición</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0e27; color: #e2e8f0; min-height: 100vh; }
        .navbar { background: rgba(15,23,42,0.8) !important; backdrop-filter: blur(20px); border-bottom: 1px solid rgba(99,102,241,0.2); }
        .navbar-brand { font-weight: 800; color: #fff !important; }
        .navbar-brand i { color: #6366f1; }
        .container { padding: 3rem 1rem; }
        .page-title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg,#6366f1,#8b5cf6,#ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 2rem; }
        .form-card { background: rgba(15,23,42,0.6); border: 1px solid rgba(99,102,241,0.2); border-radius: 20px; padding: 2.5rem; }
        .form-label { font-weight: 600; color: #94a3b8; text-transform: uppercase; font-size: 0.85rem; }
        .form-control { background: rgba(15,23,42,0.8); border: 1px solid rgba(99,102,241,0.3); color: #e2e8f0; padding: 12px 16px; border-radius: 10px; }
        .form-control:focus { background: rgba(15,23,42,0.9); border-color: #6366f1; color: #fff; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        .btn-submit { background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; padding: 14px 50px; border-radius: 12px; color: white; font-weight: 700; font-size: 1.1rem; }
        .back-btn { background: rgba(99,102,241,0.2); border: 1px solid rgba(99,102,241,0.3); color: #6366f1; padding: 8px 16px; border-radius: 10px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark px-4 py-3">
        <div class="d-flex align-items-center gap-3">
            <a href="/competiciones" class="back-btn"><i class="bi bi-arrow-left"></i></a>
            <a class="navbar-brand" href="/"><i class="bi bi-hexagon-fill me-2"></i>Fútbol Club</a>
        </div>
    </nav>
    <div class="container col-md-6">
        <h1 class="page-title" th:text="${competicion.id == null} ? 'Nueva Competición' : 'Editar Competición'"></h1>
        <form th:action="@{/competiciones/guardar}" th:object="${competicion}" method="post" class="form-card">
            <input type="hidden" th:field="*{id}"/>
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" placeholder="Nombre de la competición" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Monto Premio ($)</label>
                    <input type="number" th:field="*{montoPremio}" class="form-control" placeholder="0" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fecha Inicio</label>
                    <input type="date" th:field="*{fechaInicio}" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fecha Fin</label>
                    <input type="date" th:field="*{fechaFin}" class="form-control">
                </div>
                <div class="col-12 text-center mt-4">
                    <button type="submit" class="btn-submit"><i class="bi bi-save me-2"></i>Guardar</button>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
